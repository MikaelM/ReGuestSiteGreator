version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: reguest-postgres
    environment:
      POSTGRES_DB: ReGuestSiteGreator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: src/ReGuestSiteGreator.API/Dockerfile
    container_name: reguest-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ReGuestSiteGreator;Username=postgres;Password=postgres
      - Jwt__Key=CHANGE_ME_TO_A_STRONG_SECRET_KEY_AT_LEAST_32_CHARS
      - Jwt__Issuer=ReGuestSiteGreator
      - Jwt__Audience=ReGuestSiteGreatorClients
      - Jwt__ExpiryHours=24
    depends_on:
      - postgres

volumes:
  postgres_data:
